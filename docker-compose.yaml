services:
  redis:
    image: redis:8.6.1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel:
    image: redis:8.6.1
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "26379:26379"
    command:
      - sh
      - -c
      - |
        printf '%s\n' \
          'port 26379' \
          'dir /tmp' \
          'sentinel monitor master redis 6379 1' \
          'sentinel resolve-hostnames yes' \
          'sentinel down-after-milliseconds master 5000' \
          'sentinel failover-timeout master 10000' \
          > /tmp/sentinel.conf
        exec redis-sentinel /tmp/sentinel.conf
